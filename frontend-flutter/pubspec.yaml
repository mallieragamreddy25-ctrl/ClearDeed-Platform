name: cleardeed
description: "ClearDeed - End-to-end verified real estate & investment execution platform"
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Networking & API
  dio: ^5.3.0
  retrofit: ^4.0.0
  json_serializable: ^6.7.0

  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0

  # UI & Theming
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.0
  intl: ^0.18.0
  carousel_slider: ^4.2.0

  # Navigation
  go_router: ^11.1.0

  # Authentication
  jwt_decoder: ^2.0.1

  # File Upload & Picker
  image_picker: ^1.0.0
  file_picker: ^6.0.0
  image_cropper: ^5.0.0

  # Camera
  camera: ^0.10.5

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.0.0

  # Notifications
  firebase_core: ^2.17.0
  firebase_messaging: ^14.6.0
  flutter_local_notifications: ^14.1.0

  # Logging & Monitoring
  logger: ^2.0.0
  sentry_flutter: ^7.10.0

  # Utils
  connectivity_plus: ^5.0.0
  internet_connection_checker: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  retrofit_generator: ^8.0.0

flutter:
  uses-material-design: true

  # Assets configured (directories created during build)
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/logos/

  # Fonts section removed (using Material default fonts)
